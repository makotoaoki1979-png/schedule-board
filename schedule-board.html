<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>行動予定表</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Share+Tech+Mono&display=swap');

  :root {
    --bg: #0a0e17;
    --surface: #111827;
    --surface2: #1a2235;
    --border: #1e2d45;
    --accent: #ff7b1a;
    --accent2: #e05e00;
    --text: #e8eef8;
    --text-dim: #6b7a99;
    --green: #00e5a0;
    --yellow: #ffd166;
    --red: #ff6b6b;
    --font-mono: 'Share Tech Mono', monospace;
    --font-main: 'Noto Sans JP', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--font-main);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ===== SIGNAGE VIEW ===== */
  #signage-view {
    display: flex;
    flex-direction: column;
    height: 100vh;
    max-height: 100vh;
    overflow: hidden;
    padding: 14px 28px;
    box-sizing: border-box;
  }

  .signage-columns {
    display: grid;
    grid-template-columns: 1fr;
    gap: 24px;
    flex: 1;
    overflow: hidden;
    min-height: 0;
  }

  /* 横向き or 幅768px以上で2列 */
  @media (orientation: landscape), (min-width: 768px) {
    .signage-columns {
      grid-template-columns: 1fr 1fr;
    }
  }

  .signage-col {
    display: flex;
    flex-direction: column;
    overflow: hidden;
    min-height: 0;
  }

  .col-divider {
    width: 1px;
    background: var(--border);
    position: absolute;
    left: 50%;
    top: 0;
    bottom: 0;
    pointer-events: none;
  }

  .signage-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    margin-bottom: 3px;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--border);
  }

  .signage-title {
    font-size: 1.4rem;
    font-weight: 700;
    letter-spacing: 0.15em;
    color: var(--text);
  }

  .header-date {
    text-align: center;
    line-height: 1;
    flex: 1;
  }
  .header-date .hd-month,
  .header-date .hd-day-unit,
  .header-date .hd-dow-unit {
    font-size: 1.1rem;
    font-weight: 400;
    vertical-align: baseline;
  }
  .header-date .hd-month-num,
  .header-date .hd-day-num {
    font-size: 3rem;
    font-weight: 700;
    line-height: 1;
    color: var(--text);
  }
  .header-date .hd-dow {
    font-size: 3rem;
    font-weight: 700;
    color: var(--accent);
    margin-left: 0.3em;
  }

  .clock-block { text-align: right; }

  .clock {
    font-family: var(--font-mono);
    font-size: 1.6rem;
    color: var(--accent);
    line-height: 1;
    letter-spacing: 0.05em;
  }

  .date-label {
    font-size: 0.78rem;
    color: var(--text-dim);
    margin-bottom: 3px;
    letter-spacing: 0.08em;
  }

  .dept-section { margin-bottom: 8px; }

  .dept-label {
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 0.2em;
    color: var(--accent);
    margin-bottom: 3px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .dept-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--accent);
    opacity: 0.4;
  }

  /* ===== TABLE LAYOUT for signage ===== */
  .schedule-table {
    width: 100%;
    border-collapse: collapse;
  }
  .schedule-table thead tr {
    border-bottom: 1px solid var(--border);
  }
  .schedule-table th {
    font-size: 0.8rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    color: var(--text-dim);
    padding: 4px 16px;
    text-align: left;
  }
  .schedule-table th.col-name   { width: 8em; }
  .schedule-table th.col-dest   { }
  .schedule-table th.col-return { width: 6em; text-align: left; }
  .schedule-table th.col-del    { width: 36px; }

  .schedule-table tbody tr {
    border-bottom: 1px solid rgba(30,45,69,0.6);
    animation: fadeIn 0.35s ease;
  }
  .schedule-table tbody tr:last-child { border-bottom: none; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(4px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .schedule-table td {
    padding: 0.28em 0.9em;
    font-size: 1em;
    vertical-align: middle;
  }

  .status-dot {
    width: 9px;
    height: 9px;
    border-radius: 50%;
    display: inline-block;
  }
  .status-out  .status-dot { background: var(--yellow); box-shadow: 0 0 5px var(--yellow); }
  .status-in   .status-dot { background: var(--green);  box-shadow: 0 0 5px var(--green); }
  .status-direct .status-dot { background: var(--text-dim); }

  .td-name { font-weight: 700; white-space: nowrap; overflow: hidden; max-width: 8em; }
  .td-dest { color: var(--text-dim); font-size: 0.92em; white-space: nowrap; overflow: hidden; max-width: 10em; }
  .td-return {
    font-family: var(--font-mono);
    font-size: 1.8rem !important;
    font-weight: 700;
    color: var(--accent);
    text-align: right;
    white-space: nowrap;
  }
  .td-del { display: none; }
  .schedule-table th.col-del { display: none; }
  .del-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-dim);
    width: 22px;
    height: 22px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 0.7rem;
    line-height: 1;
    transition: border-color 0.2s, color 0.2s;
    display: inline-flex;
    align-items: center;
    justify-content: center;
  }
  .del-btn:hover { border-color: var(--red); color: var(--red); }

  .signage-footer {
    margin-top: auto;
    padding-top: 8px;
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .update-info {
    font-size: 0.72rem;
    color: var(--text-dim);
    font-family: var(--font-mono);
  }

  .pulse-dot {
    display: inline-block;
    width: 6px; height: 6px;
    background: var(--green);
    border-radius: 50%;
    margin-right: 6px;
    animation: pulse 2s infinite;
    vertical-align: middle;
  }
  @keyframes pulse {
    0%,100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  .open-input-btn {
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    border: none;
    color: #fff;
    font-family: var(--font-main);
    font-size: 0.8rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    padding: 8px 20px;
    border-radius: 6px;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .open-input-btn:hover { opacity: 0.85; }

  .empty-state {
    color: var(--text-dim);
    font-size: 0.82rem;
    padding: 14px 0;
    letter-spacing: 0.05em;
  }

  /* ===== ACTIVE ROW HIGHLIGHT ===== */
  .schedule-table tbody tr.row-active {
    background: rgba(255, 123, 26, 0.10);
  }
  .schedule-table tbody tr.row-active .td-name {
    color: #fff;
  }
  .schedule-table tbody tr.row-active .td-return {
    color: var(--accent);
    font-weight: 700;
  }
  .schedule-table tbody tr.row-active .status-dot {
    box-shadow: 0 0 8px var(--accent);
    background: var(--accent);
  }
  .row-active-bar {
    display: inline-block;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 6px var(--accent);
    animation: pulse 1.5s infinite;
    margin-left: 6px;
    vertical-align: middle;
  }

  /* ===== INPUT VIEW ===== */
  #input-view {
    display: none;
    min-height: 100vh;
    padding: 28px 20px;
    max-width: 480px;
    margin: 0 auto;
    font-size: 1.1rem;
  }

  .input-header {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 28px;
  }

  .back-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-dim);
    width: 36px; height: 36px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 1.1rem;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: border-color 0.2s, color 0.2s;
  }
  .back-btn:hover { border-color: var(--accent); color: var(--accent); }

  .input-title {
    font-size: 1.3rem;
    font-weight: 700;
    letter-spacing: 0.1em;
  }

  /* 登録済み一覧（入力画面上部） */
  .my-entries {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 18px;
    margin-bottom: 16px;
  }
  .my-entries-title {
    font-size: 0.68rem;
    font-weight: 700;
    letter-spacing: 0.15em;
    color: var(--accent);
    margin-bottom: 3px;
  }
  .my-entry-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 7px 0;
    border-bottom: 1px solid var(--border);
    font-size: 1rem;
    gap: 10px;
  }
  .my-entry-row:last-child { border-bottom: none; }
  .my-entry-dest { flex: 1; color: var(--text); }
  .my-entry-ret  { font-family: var(--font-mono); color: var(--accent); font-size: 1.3rem; font-weight: 700; white-space: nowrap; }
  .my-entry-del  {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-dim);
    width: 24px; height: 24px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 0.75rem;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: border-color 0.2s, color 0.2s;
  }
  .my-entry-del:hover { border-color: var(--red); color: var(--red); }
  .my-entries-empty { font-size: 0.8rem; color: var(--text-dim); }
  .tomorrow-badge {
    display: inline-block;
    font-size: 0.65rem;
    font-weight: 700;
    background: var(--accent);
    color: #fff;
    border-radius: 3px;
    padding: 1px 5px;
    margin-right: 5px;
    vertical-align: middle;
    letter-spacing: 0.05em;
  }

  .form-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 16px;
  }

  .form-section-title {
    font-size: 0.82rem;
    font-weight: 700;
    letter-spacing: 0.15em;
    color: var(--accent);
    margin-bottom: 14px;
  }

  .field-row { margin-bottom: 14px; }
  .field-row:last-child { margin-bottom: 0; }

  .field-label {
    font-size: 0.9rem;
    color: var(--text-dim);
    margin-bottom: 3px;
    letter-spacing: 0.05em;
  }

  .field-value-display {
    font-size: 1.2rem;
    font-weight: 500;
    color: var(--text);
  }

  .profile-inline {
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
  }
  .profile-inline-item {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .edit-profile-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-family: var(--font-main);
    font-size: 0.72rem;
    padding: 4px 12px;
    border-radius: 4px;
    cursor: pointer;
    margin-top: 10px;
    transition: border-color 0.2s, color 0.2s;
  }
  .edit-profile-btn:hover { border-color: var(--accent); color: var(--accent); }

  select, input[type="text"], input[type="time"] {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: var(--font-main);
    font-size: 1.1rem;
    padding: 13px 14px;
    outline: none;
    transition: border-color 0.2s;
    -webkit-appearance: none;
    appearance: none;
  }
  select:focus, input[type="text"]:focus, input[type="time"]:focus {
    border-color: var(--accent);
  }
  select option { background: var(--surface2); }

  .dest-wrapper {
    position: relative;
  }

  .dest-history {
    position: absolute;
    top: 100%;
    left: 0; right: 0;
    background: var(--surface2);
    border: 1px solid var(--accent);
    border-top: none;
    border-radius: 0 0 8px 8px;
    z-index: 100;
    max-height: 320px;
    overflow-y: auto;
  }

  .dest-history-item {
    padding: 12px 14px;
    font-size: 1rem;
    cursor: pointer;
    border-bottom: 1px solid var(--border);
    color: var(--text);
    transition: background 0.15s;
  }
  .dest-history-item:last-child { border-bottom: none; }
  .dest-history-item:hover { background: rgba(255,123,26,0.12); color: var(--accent); }

  .preset-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 10px;
  }
  .chip {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-size: 0.95rem;
    padding: 8px 16px;
    border-radius: 20px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .chip:hover, .chip.active {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(0,198,255,0.08);
  }

  .return-options {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 8px;
    margin-bottom: 12px;
  }
  .return-opt-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-family: var(--font-main);
    font-size: 1rem;
    padding: 12px;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
  }
  .return-opt-btn:hover, .return-opt-btn.active {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(0,198,255,0.08);
  }

  #time-input-wrap { margin-top: 10px; }
  #time-input-wrap.hidden { display: none; }

  .submit-btn {
    width: 100%;
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    border: none;
    color: #fff;
    font-family: var(--font-main);
    font-size: 1.15rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    padding: 18px;
    border-radius: 10px;
    cursor: pointer;
    margin-top: 8px;
    transition: opacity 0.2s, transform 0.1s;
  }
  .submit-btn:hover { opacity: 0.9; }
  .submit-btn:active { transform: scale(0.98); }

  .toast {
    position: fixed;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--green);
    color: #0a0e17;
    font-weight: 700;
    font-size: 0.85rem;
    padding: 12px 28px;
    border-radius: 100px;
    opacity: 0;
    transition: opacity 0.3s, transform 0.3s;
    pointer-events: none;
    white-space: nowrap;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* ===== PROFILE VIEW ===== */
  #profile-view {
    display: none;
    min-height: 100vh;
    padding: 28px 20px;
    max-width: 480px;
    margin: 0 auto;
  }
  .profile-header { margin-bottom: 32px; }
  .profile-title {
    font-size: 1.1rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    margin-bottom: 3px;
  }
  .profile-sub { font-size: 0.78rem; color: var(--text-dim); }

  @media (min-width: 1024px) {
    #signage-view { padding: 40px 56px; }
    .signage-title { font-size: 1.6rem; }
    .clock { font-size: 3rem; }
    #schedule-container { font-size: 1.4rem; }
  }
  @media (max-width: 600px) {
    #signage-view { padding: 20px 16px; }
    .schedule-table th.col-del, .schedule-table td.td-del { display: none; }
  }
</style>
</head>
<body>

<!-- ===== SIGNAGE VIEW ===== -->
<div id="signage-view">
  <div class="signage-header">
    <div class="signage-title">行動予定表</div>
    <div class="header-date" id="header-date"></div>
    <div class="clock-block">
      <div class="date-label" id="date-label"></div>
      <div class="clock" id="clock">--:--:--</div>
    </div>
  </div>

  <div class="signage-columns">
    <div class="signage-col" id="col-left"></div>
    <div class="signage-col" id="col-right"></div>
  </div>

  <div class="signage-footer">
    <div class="update-info">
      <span class="pulse-dot"></span>
      <span id="last-updated">取得中...</span>
    </div>
    <button class="open-input-btn" onclick="openInput()">＋ 予定を登録</button>
  </div>
</div>

<!-- ===== PROFILE VIEW ===== -->
<div id="profile-view">
  <div class="profile-header">
    <div class="profile-title">プロフィール設定</div>
    <div class="profile-sub">部署と氏名を入力してください（次回から自動入力されます）</div>
  </div>
  <div class="form-section">
    <div class="form-section-title">基本情報</div>
    <div class="field-row">
      <div class="field-label">部署</div>
      <select id="profile-dept">
        <option value="">選択してください</option>
        <option value="営業">営業</option>
        <option value="総務">総務</option>
        <option value="制作">制作</option>
      </select>
    </div>
    <div class="field-row">
      <div class="field-label">氏名</div>
      <input type="text" id="profile-name" placeholder="例：山田 太郎">
    </div>
  </div>
  <button class="submit-btn" onclick="saveProfile()">保存して続ける</button>
</div>

<!-- ===== INPUT VIEW ===== -->
<div id="input-view">
  <div class="input-header">
    <button class="back-btn" onclick="showSignage()">←</button>
    <div class="input-title">行動予定を登録</div>
  </div>

  <!-- 自分の登録済み一覧 -->
  <div class="my-entries">
    <div class="my-entries-title">登録済みの予定</div>
    <div id="my-entries-list"></div>
  </div>

  <div class="form-section">
    <div class="form-section-title">日付</div>
    <div class="return-options" id="day-options">
      <button class="return-opt-btn active" id="btn-today" onclick="setDayMode('today')">今日</button>
      <button class="return-opt-btn" id="btn-tomorrow" onclick="setDayMode('tomorrow')">翌営業日</button>
    </div>
  </div>

  <div class="form-section">
    <div class="form-section-title">行先</div>
    <div class="field-row">
      <div class="dest-wrapper">
        <input type="text" id="dest-input" placeholder="例：○○印刷 訪問、外出中 など"
          oninput="onDestInput()"
          onfocus="showDestHistory()"
          onblur="setTimeout(hideDestHistory, 200)"
          autocomplete="off">
        <div class="dest-history" id="dest-history" style="display:none;"></div>
      </div>
      <div class="preset-chips">
        <span class="chip" onclick="setDest(this,'在席')">在席</span>
        <span class="chip" onclick="setDest(this,'外出中')">外出中</span>
        <span class="chip" onclick="setDest(this,'直行')">直行</span>
        <span class="chip" onclick="setDest(this,'会議室')">会議室</span>
        <span class="chip" onclick="setDest(this,'テレワーク')">テレワーク</span>
      </div>
    </div>
  </div>

  <div class="form-section">
    <div class="form-section-title">帰着予定</div>
    <div class="return-options">
      <button class="return-opt-btn" id="btn-time" onclick="setReturnMode('time')">時刻を指定</button>
      <button class="return-opt-btn active" id="btn-chokki" onclick="setReturnMode('chokki')">直帰</button>
      <button class="return-opt-btn" id="btn-shujitsu" onclick="setReturnMode('shujitsu')">終日</button>
    </div>
    <div id="time-input-wrap" class="hidden">
      <select id="return-time">
        <option value="08:00">08:00</option>
        <option value="08:15">08:15</option>
        <option value="08:30">08:30</option>
        <option value="08:45">08:45</option>
        <option value="09:00">09:00</option>
        <option value="09:15">09:15</option>
        <option value="09:30">09:30</option>
        <option value="09:45">09:45</option>
        <option value="10:00">10:00</option>
        <option value="10:15">10:15</option>
        <option value="10:30">10:30</option>
        <option value="10:45">10:45</option>
        <option value="11:00">11:00</option>
        <option value="11:15">11:15</option>
        <option value="11:30">11:30</option>
        <option value="11:45">11:45</option>
        <option value="12:00">12:00</option>
        <option value="12:15">12:15</option>
        <option value="12:30">12:30</option>
        <option value="12:45">12:45</option>
        <option value="13:00">13:00</option>
        <option value="13:15">13:15</option>
        <option value="13:30">13:30</option>
        <option value="13:45">13:45</option>
        <option value="14:00">14:00</option>
        <option value="14:15">14:15</option>
        <option value="14:30">14:30</option>
        <option value="14:45">14:45</option>

<div class="toast" id="toast">登録しました</div>

<script>
// ============================================================
//  GAS API設定
//  【設定】デプロイ後にGASのWebアプリURLを貼り付ける
// ============================================================
const GAS_URL = 'https://script.google.com/macros/s/AKfycbxgTHRD8AVsHCtH84H1_wzjbJ2gVhgviQpaYxQpmSqmSe4LSMEvfN3rAIb3CrhOi6V_/exec';

// GAS連携フラグ（GAS_URLが設定されていれば自動でオンライン動作）
const USE_GAS = GAS_URL.startsWith('https://');

const DEPTS = ['営業', '総務', '制作'];
const LEFT_DEPTS  = ['営業', '総務'];  // 左列
const RIGHT_DEPTS = ['制作'];          // 右列
const STORAGE_KEY  = 'schedule_data_v2';
const PROFILE_KEY  = 'user_profile_v1';
const DATE_KEY     = 'schedule_date_v2';

let returnMode = 'chokki';
let dayMode = 'today';
let isEditingProfile = false;

// ===== 日付チェック・自動リセット =====
function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`;
}

function tomorrowStr() {
  const d = new Date();
  d.setDate(d.getDate() + 1);
  // 土曜(6)→+2日、日曜(0)→+1日
  const dow = d.getDay();
  if (dow === 6) d.setDate(d.getDate() + 2);
  else if (dow === 0) d.setDate(d.getDate() + 1);
  return `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`;
}

function checkDayReset() {
  const saved = localStorage.getItem(DATE_KEY);
  const today = todayStr();
  if (saved !== today) {
    try {
      const all = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
      const keep = all.filter(r => r.dateStr === today);
      localStorage.setItem(STORAGE_KEY, JSON.stringify(keep));
    } catch { localStorage.setItem(STORAGE_KEY, JSON.stringify([])); }
    localStorage.setItem(DATE_KEY, today);
    // GAS側もリセット
    if (USE_GAS) gasReset(today).catch(()=>{});
  }
}

// ===== DATA (配列形式) =====
// 各エントリ: { id, dept, name, dest, return, dateStr, updatedAt }

function loadData() {
  checkDayReset();
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
  catch { return []; }
}

function saveData(arr) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(arr));
}

function genId() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2,6);
}

// ===== GAS API =====
async function gasGet() {
  const res  = await fetch(GAS_URL + '?action=get');
  const json = await res.json();
  if (json.entries) {
    saveData(json.entries);
    localStorage.setItem(DATE_KEY, todayStr());
  }
}

async function gasAdd(entry) {
  await fetch(GAS_URL, {
    method: 'POST',
    body: JSON.stringify({ action: 'add', entry })
  });
}

async function gasDelete(id) {
  await fetch(GAS_URL, {
    method: 'POST',
    body: JSON.stringify({ action: 'delete', id })
  });
}

async function gasReset(today) {
  await fetch(GAS_URL, {
    method: 'POST',
    body: JSON.stringify({ action: 'reset', today })
  });
}

// ===== PROFILE =====
function loadProfile() {
  try { return JSON.parse(localStorage.getItem(PROFILE_KEY)) || null; }
  catch { return null; }
}
function saveProfileData(dept, name) {
  localStorage.setItem(PROFILE_KEY, JSON.stringify({ dept, name }));
}

// ===== CLOCK =====
function updateClock() {
  const now = new Date();
  const hh = String(now.getHours()).padStart(2,'0');
  const mm = String(now.getMinutes()).padStart(2,'0');
  const ss = String(now.getSeconds()).padStart(2,'0');
  document.getElementById('clock').textContent = `${hh}:${mm}:${ss}`;
  const days = ['日','月','火','水','木','金','土'];
  const mo  = now.getMonth() + 1;
  const d   = now.getDate();
  const dow = days[now.getDay()];
  document.getElementById('date-label').textContent =
    `${now.getFullYear()}年${mo}月${d}日（${dow}）`;
  document.getElementById('header-date').innerHTML =
    `<span class="hd-month-num">${mo}</span><span class="hd-month">月</span>` +
    `<span class="hd-day-num">${d}</span><span class="hd-day-unit">日</span>` +
    `<span class="hd-space"> </span><span class="hd-dow">${dow}</span>`;

  // 日付が変わったらリセット
  checkDayReset();
}
setInterval(updateClock, 1000);
updateClock();

// ===== RENDER SIGNAGE =====
function buildDeptSection(dept, data) {
  const today = todayStr();
  const rows = data.filter(r => r.dept === dept && (!r.dateStr || r.dateStr === today || r.dateStr === tomorrowStr()));

  // 当日分のみ表示（翌営業日分は翌日になったら表示）
  const displayRows = data.filter(r => r.dept === dept && (!r.dateStr || r.dateStr === today));

  // ソート
  const sorted = displayRows.slice().sort((a, b) => {
    const isToday = r => !r.dateStr || r.dateStr === today;
    const dayOrder = r => isToday(r) ? 0 : 1;
    const retOrder = r => {
      if (r.return === '直帰') return 2;
      if (r.return === '終日') return 3;
      return 1;
    };
    const dd = dayOrder(a) - dayOrder(b);
    if (dd !== 0) return dd;
    const ro = retOrder(a) - retOrder(b);
    if (ro !== 0) return ro;
    if (retOrder(a) === 1) return a.return.localeCompare(b.return);
    return 0;
  });

  const section = document.createElement('div');
  section.className = 'dept-section';

  const label = document.createElement('div');
  label.className = 'dept-label';
  label.textContent = dept;
  section.appendChild(label);

  if (sorted.length === 0) {
    const empty = document.createElement('div');
    empty.className = 'empty-state';
    empty.textContent = '登録なし';
    section.appendChild(empty);
  } else {
    const table = document.createElement('table');
    table.className = 'schedule-table';
    table.innerHTML = `<thead><tr>
      <th class="col-name">氏名</th>
      <th class="col-dest">行先</th>
      <th class="col-return">帰着予定</th>
      <th class="col-del"></th>
    </tr></thead>`;
    const tbody = document.createElement('tbody');

    sorted.forEach(r => {
      const isDirect = r.return === '直帰';
      const isIn = ['在席','会議室','テレワーク'].includes(r.dest);
      const sc = isDirect ? 'status-direct' : isIn ? 'status-in' : 'status-out';
      const isActive = isCurrentEntry(r);
      const tr = document.createElement('tr');
      tr.className = sc + (isActive ? ' row-active' : '');
      const activeDot = isActive ? '<span class="row-active-bar"></span>' : '';
      tr.innerHTML = `
        <td class="td-name">${escHtml(truncate(r.name,4))}${activeDot}</td>
        <td class="td-dest">${escHtml(truncate(r.dest,10))}</td>
        <td class="td-return">${escHtml(r.return)}</td>
        <td class="td-del"><button class="del-btn" title="削除" onclick="deleteEntry('${r.id}')">✕</button></td>
      `;
      tbody.appendChild(tr);
    });

    table.appendChild(tbody);
    section.appendChild(table);
  }
  return section;
}

function renderSignage() {
  const data = loadData();
  const colLeft  = document.getElementById('col-left');
  const colRight = document.getElementById('col-right');
  colLeft.innerHTML  = '';
  colRight.innerHTML = '';

  LEFT_DEPTS.forEach(dept  => colLeft.appendChild(buildDeptSection(dept, data)));
  RIGHT_DEPTS.forEach(dept => colRight.appendChild(buildDeptSection(dept, data)));

  const now = new Date();
  document.getElementById('last-updated').textContent =
    `最終更新 ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}:${String(now.getSeconds()).padStart(2,'0')}`;
}

function deleteEntry(id) {
  const data = loadData().filter(r => r.id !== id);
  saveData(data);
  if (USE_GAS) gasDelete(id).catch(()=>{});
  renderSignage();
}

async function refreshSignage() {
  if (USE_GAS) {
    try { await gasGet(); } catch(e) { console.warn('GAS取得失敗:', e); }
  }
  renderSignage();
  autoFitFont();
}

setInterval(refreshSignage, 30000);
refreshSignage();
window.addEventListener('resize', () => { autoFitFont(); });
window.addEventListener('orientationchange', () => { setTimeout(() => { autoFitFont(); }, 200); });

// ===== NAVIGATION =====
function showSignage() {
  document.getElementById('signage-view').style.display = 'flex';
  document.getElementById('input-view').style.display = 'none';
  document.getElementById('profile-view').style.display = 'none';
  renderSignage();
}

function openInput() {
  const profile = loadProfile();
  if (!profile || !profile.name || !profile.dept) {
    showProfile(false);
    return;
  }
  document.getElementById('display-dept').textContent = profile.dept;
  document.getElementById('display-name').textContent = profile.name;
  document.getElementById('dest-input').value = '';
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  setReturnMode('chokki');
  setDayMode('today');
  renderMyEntries(profile);
  document.getElementById('signage-view').style.display = 'none';
  document.getElementById('input-view').style.display = 'block';
  document.getElementById('profile-view').style.display = 'none';
}

function sortRows(rows) {
  const today = todayStr();
  return rows.slice().sort((a, b) => {
    const isToday = r => !r.dateStr || r.dateStr === today;
    const dayOrder = r => isToday(r) ? 0 : 1;
    const retOrder = r => {
      if (r.return === '直帰') return 2;
      if (r.return === '終日') return 3;
      return 1;
    };
    const dd = dayOrder(a) - dayOrder(b);
    if (dd !== 0) return dd;
    const ro = retOrder(a) - retOrder(b);
    if (ro !== 0) return ro;
    if (retOrder(a) === 1) return a.return.localeCompare(b.return);
    return 0;
  });
}

function renderMyEntries(profile) {
  const data = loadData();
  const mine = sortRows(data.filter(r => r.dept === profile.dept && r.name === profile.name));
  const list = document.getElementById('my-entries-list');
  list.innerHTML = '';
  if (mine.length === 0) {
    list.innerHTML = '<div class="my-entries-empty">まだ登録はありません</div>';
    return;
  }
  mine.forEach(r => {
    const row = document.createElement('div');
    row.className = 'my-entry-row';
    const badge = r.dateStr === tomorrowStr() ? '<span class="tomorrow-badge">翌営</span>' : '';
    row.innerHTML = `
      <span class="my-entry-dest">${badge}${escHtml(r.dest)}</span>
      <span class="my-entry-ret">${escHtml(r.return)}</span>
      <button class="my-entry-del" onclick="deleteMyEntry('${r.id}')" title="削除">✕</button>
    `;
    list.appendChild(row);
  });
}

function deleteMyEntry(id) {
  const data = loadData().filter(r => r.id !== id);
  saveData(data);
  if (USE_GAS) gasDelete(id).catch(()=>{});
  const profile = loadProfile();
  renderMyEntries(profile);
}

function showProfile(editing) {
  isEditingProfile = editing;
  const profile = loadProfile();
  if (profile) {
    document.getElementById('profile-dept').value = profile.dept || '';
    document.getElementById('profile-name').value = profile.name || '';
  }
  document.getElementById('signage-view').style.display = 'none';
  document.getElementById('input-view').style.display = 'none';
  document.getElementById('profile-view').style.display = 'block';
}

function saveProfile() {
  const dept = document.getElementById('profile-dept').value;
  const name = document.getElementById('profile-name').value.trim();
  if (!dept) { alert('部署を選択してください'); return; }
  if (!name) { alert('氏名を入力してください'); return; }
  saveProfileData(dept, name);
  openInput();
}

// ===== INPUT FORM =====
function setDest(el, val) {
  document.getElementById('dest-input').value = val;
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  hideDestHistory();
}

function setDayMode(mode) {
  dayMode = mode;
  document.getElementById('btn-today').classList.toggle('active', mode === 'today');
  document.getElementById('btn-tomorrow').classList.toggle('active', mode === 'tomorrow');
}

function setReturnMode(mode) {
  returnMode = mode;
  document.getElementById('btn-time').classList.toggle('active', mode === 'time');
  document.getElementById('btn-chokki').classList.toggle('active', mode === 'chokki');
  document.getElementById('btn-shujitsu').classList.toggle('active', mode === 'shujitsu');
  document.getElementById('time-input-wrap').classList.toggle('hidden', mode !== 'time');
}

function submitSchedule() {
  const profile = loadProfile();
  const dest = document.getElementById('dest-input').value.trim();
  if (!dest) { alert('行先を入力してください'); return; }

  const ret = returnMode === 'chokki' ? '直帰' : returnMode === 'shujitsu' ? '終日' : document.getElementById('return-time').value;

  saveDestHistory(dest);
  const data = loadData();
  const targetDate = dayMode === 'tomorrow' ? tomorrowStr() : todayStr();

  // 重複チェック：同じ人・同じ行先・同じ帰着・同じ日付
  const duplicate = data.find(r =>
    r.dept === profile.dept &&
    r.name === profile.name &&
    r.dest === dest &&
    r.return === ret &&
    (r.dateStr || todayStr()) === targetDate
  );
  if (duplicate) {
    showToast('同じ予定が登録済みです', true);
    return;
  }

  const newEntry = {
    id: genId(),
    dept: profile.dept,
    name: profile.name,
    dest,
    return: ret,
    dateStr: targetDate,
    updatedAt: new Date().toISOString()
  };
  data.push(newEntry);
  saveData(data);
  if (USE_GAS) gasAdd(newEntry).catch(()=>{});

  // フォームリセット
  document.getElementById('dest-input').value = '';
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  setReturnMode('chokki');
  setDayMode('today');
  renderMyEntries(profile);

  showToast('登録しました');
}

function showToast(msg, warn) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.background = warn ? 'var(--yellow)' : 'var(--green)';
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

// 文字数制限（全角換算）
function truncate(str, maxLen) {
  if (!str) return '';
  let count = 0, result = '';
  for (const ch of str) {
    const code = ch.codePointAt(0);
    const isWide = code > 0xFF;
    count += isWide ? 1 : 0.5;
    if (count > maxLen) { result += '…'; break; }
    result += ch;
  }
  return result;
}

// 現在進行中の予定かどうか判定
function isCurrentEntry(r) {
  const ret = r.return;
  // 終日・直帰は常にハイライト
  if (ret === '直帰' || ret === '終日') return true;
  // 時刻指定は帰着前のみ
  const now = new Date();
  const [hh, mm] = ret.split(':').map(Number);
  const returnMinutes = hh * 60 + mm;
  const nowMinutes = now.getHours() * 60 + now.getMinutes();
  return nowMinutes <= returnMinutes;
}

// サイネージ全行が画面内に収まるようフォントサイズを自動調整
function autoFitFont() {
  const view = document.getElementById('signage-view');
  const colLeft  = document.getElementById('col-left');
  const colRight = document.getElementById('col-right');
  if (!view || !colLeft || !colRight) return;

  colLeft.style.fontSize  = '';
  colRight.style.fontSize = '';

  const availableH = view.clientHeight
    - (view.querySelector('.signage-header')?.offsetHeight || 0)
    - (view.querySelector('.signage-footer')?.offsetHeight || 0)
    - 24;

  let fontSize = 1.25;
  const MIN = 0.85;
  const STEP = 0.05;

  function applySize(size) {
    colLeft.style.fontSize  = size + 'rem';
    colRight.style.fontSize = size + 'rem';
  }

  function fixReturnSize() {
    document.querySelectorAll('.td-return').forEach(td => {
      td.style.fontSize = '1.8rem';
    });
  }

  applySize(fontSize);

  while (fontSize > MIN) {
    applySize(fontSize);
    fixReturnSize();
    const isTwoCol = window.innerWidth >= 768 || window.innerWidth > window.innerHeight;
    const maxH = isTwoCol
      ? Math.max(colLeft.scrollHeight, colRight.scrollHeight)
      : colLeft.scrollHeight + colRight.scrollHeight;
    if (maxH <= availableH) break;
    fontSize = Math.round((fontSize - STEP) * 100) / 100;
  }
  fixReturnSize();
}

// ===== 行先履歴 =====
const DEST_HISTORY_KEY = 'dest_history_v1';
const PRESET_DESTS = ['在席','外出中','直行','会議室','テレワーク'];

function loadDestHistory() {
  try { return JSON.parse(localStorage.getItem(DEST_HISTORY_KEY)) || []; }
  catch { return []; }
}

function saveDestHistory(dest) {
  if (!dest) return;
  let history = loadDestHistory().filter(d => d !== dest);
  history.unshift(dest);
  if (history.length > 30) history = history.slice(0, 30);
  localStorage.setItem(DEST_HISTORY_KEY, JSON.stringify(history));
}

function getFilteredHistory(query) {
  const all = loadDestHistory();
  const q = query.trim().toLowerCase();
  const filtered = q ? all.filter(d => d.toLowerCase().includes(q)) : all;
  // プリセットを除外して最近10件
  return filtered.filter(d => !PRESET_DESTS.includes(d)).slice(0, 10);
}

function showDestHistory() {
  const query = document.getElementById('dest-input').value;
  renderDestHistory(query);
}

function onDestInput() {
  const query = document.getElementById('dest-input').value;
  renderDestHistory(query);
  // チップのactiveを解除
  document.querySelectorAll('.chip').forEach(c => {
    if (c.getAttribute('data-val') !== query) c.classList.remove('active');
  });
}

function renderDestHistory(query) {
  const box = document.getElementById('dest-history');
  const items = getFilteredHistory(query);
  if (items.length === 0) { box.style.display = 'none'; return; }
  box.innerHTML = items.map(d =>
    `<div class="dest-history-item" onmousedown="selectDestHistory('${escHtml(d)}')">${escHtml(d)}</div>`
  ).join('');
  box.style.display = 'block';
}

function hideDestHistory() {
  const box = document.getElementById('dest-history');
  if (box) box.style.display = 'none';
}

function selectDestHistory(val) {
  document.getElementById('dest-input').value = val;
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  hideDestHistory();
}

function escHtml(str) {
  if (!str) return '';
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
